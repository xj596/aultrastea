<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AultrasTea 新闻管理后台</title>
  <!-- 1. 国内稳定的Netlify CMS核心JS -->
  <script src="https://cdn.bootcdn.net/ajax/libs/netlify-cms/2.10.197/netlify-cms.min.js"></script>
  <!-- 2. 核心缺失的Netlify Identity身份认证JS（登录框必须的脚本） -->
  <script src="https://cdn.bootcdn.net/ajax/libs/netlify-identity-widget/1.9.2/netlify-identity-widget.min.js"></script>
</head>
<body>
  <!-- 必须的页面容器，确保CMS能正常渲染 -->
  <div id="nc-root"></div>
  <!-- 初始化身份认证和CMS -->
  <script>
    // 初始化身份认证
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
    // 初始化CMS
    window.CMS.init();
  </script>
</body>
</html>
